<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>PilotCode</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/easter-egg.css">
</head>
<body>

  <!-- Login -->
  <div id="login-view">
    <h1>PilotCode</h1>
    <p class="subtitle">Control Claude Code from anywhere</p>
    <form id="login-form">
      <input id="token-input" type="password" placeholder="Enter auth token" autocomplete="off" required>
      <button type="submit">Connect</button>
    </form>
    <div id="login-error"></div>
  </div>

  <!-- App -->
  <div id="app-view">
    <!-- Header -->
    <div id="header">
      <button id="menu-btn" class="header-btn">&#9776;</button>
      <span class="logo">PilotCode</span>
      <span id="session-name">No Session</span>
      <button id="ding-toggle" class="header-btn ding-on" title="Toggle notification sound">&#128276;</button>
      <button id="push-toggle" class="header-btn push-off" title="Push notifications: OFF" style="display:none">⌚</button>
      <div id="connection-status"></div>
    </div>

    <!-- No Session Prompt -->
    <div id="no-session-prompt">
      <div class="no-session-inner">
        <div class="no-session-glow"></div>
        <div class="no-session-icon" id="ee-trigger">&#9670;</div>
        <p class="no-session-text">Start a conversation</p>
        <button id="start-session-btn">New Session</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages"></div>
    <button id="scroll-bottom-btn">&#8595;</button>

    <!-- Image Preview -->
    <div id="image-preview"></div>

    <!-- Input -->
    <div id="input-area">
      <button id="image-btn" class="input-btn">&#128247;</button>
      <textarea id="message-input" rows="1" placeholder="Message Claude..."></textarea>
      <button id="send-btn" class="input-btn" disabled>&#9654;</button>
      <button id="stop-btn" class="input-btn">&#9632;</button>
    </div>
  </div>

  <!-- Session Drawer -->
  <div id="drawer-overlay"></div>
  <div id="session-drawer">
    <div id="drawer-header">
      <h2>Sessions</h2>
      <div class="drawer-header-btns">
        <button id="new-session-btn">+ New</button>
      </div>
    </div>
    <div id="drawer-content">
      <div id="session-list"></div>
      <div id="external-section" style="display:none">
        <div class="drawer-section-header" id="external-section-toggle">
          <span class="section-label">Active on Mac</span>
          <span class="section-count" id="external-count">0</span>
          <span class="section-chevron">&#9656;</span>
        </div>
        <div id="external-list"></div>
      </div>
    </div>
    <div id="drawer-footer">
      <button id="guide-btn">? Guide</button>
      <button id="force-refresh-btn">Refresh App</button>
      <span id="app-version"></span>
    </div>
  </div>

  <!-- New Session Modal -->
  <div id="new-session-modal">
    <div class="modal-content">
      <h3>New Session</h3>
      <label for="session-name-input">Name</label>
      <input id="session-name-input" type="text" placeholder="My Project">
      <label for="session-model-select">Model</label>
      <select id="session-model-select">
        <option value="">Loading models...</option>
      </select>
      <label for="session-cwd-select">Working Directory</label>
      <div class="cwd-path-row">
        <input id="cwd-path-input" type="text" placeholder="/path/to/directory" spellcheck="false" autocomplete="off">
        <button id="cwd-path-go" class="btn-secondary" type="button">Go</button>
      </div>
      <div id="cwd-breadcrumb" class="cwd-breadcrumb"></div>
      <select id="session-cwd-select" size="6"></select>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-create" class="btn-primary">Create</button>
      </div>
    </div>
  </div>


  <script type="module" src="/js/app.js"></script>
</body>
</html>
